version: '3.9'

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: orchestra-postgres
    environment:
      POSTGRES_USER: orchestra
      POSTGRES_PASSWORD: orchestra
      POSTGRES_DB: orchestra_engine
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orchestra']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orchestra-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: orchestra-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: orchestra-kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Application Services ─────────────────────────────────────────────────────

  migrate:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.api
    command: sh -c "cd packages/prisma && npx prisma db push --accept-data-loss && TS_NODE_COMPILER_OPTIONS='{\"module\":\"commonjs\"}' npx ts-node --skip-project prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://orchestra:orchestra@postgres:5432/orchestra_engine
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.api
    container_name: orchestra-api
    ports:
      - '3000:3000'
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://orchestra:orchestra@postgres:5432/orchestra_engine
      KAFKA_BROKERS: kafka:29092
      REDIS_HOST: redis
      API_PORT: '3000'
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  orchestrator:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.orchestrator
    container_name: orchestra-orchestrator
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://orchestra:orchestra@postgres:5432/orchestra_engine
      KAFKA_BROKERS: kafka:29092
      REDIS_HOST: redis
    depends_on:
      - api

  worker:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://orchestra:orchestra@postgres:5432/orchestra_engine
      KAFKA_BROKERS: kafka:29092
      REDIS_HOST: redis
    depends_on:
      - api
    deploy:
      replicas: 2

  scheduler:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.scheduler
    container_name: orchestra-scheduler
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://orchestra:orchestra@postgres:5432/orchestra_engine
      KAFKA_BROKERS: kafka:29092
      REDIS_HOST: redis
      API_BASE_URL: http://api:3000
    depends_on:
      - api

  dashboard:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.dashboard
    container_name: orchestra-dashboard
    ports:
      - '5173:80'
    depends_on:
      - api

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: orchestra-kafka-ui
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: orchestra
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

volumes:
  postgres_data:
  redis_data:
